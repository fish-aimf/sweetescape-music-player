<!DOCTYPE html>
<html>
<head>
  <script src="https://js.puter.com/v2/"></script>
</head>
<body>

  <h3>Puter.js Transcription Test</h3>
  <input type="file" id="audioFile" accept="audio/*">
  <select id="model">
    <option value="whisper-1">whisper-1 (most tolerant)</option>
    <option value="gpt-4o-mini-transcribe">gpt-4o-mini-transcribe</option>
    <option value="gpt-4o-transcribe">gpt-4o-transcribe</option>
    <option value="gpt-4o-transcribe-diarize">gpt-4o-transcribe-diarize (speakers)</option>
  </select>
  <button onclick="transcribe()">Transcribe</button>
  <pre id="output"></pre>

  <script>
    async function transcribe() {
      const fileInput = document.getElementById('audioFile');
      const model = document.getElementById('model').value;
      const output = document.getElementById('output');

      if (!fileInput.files.length) {
        output.textContent = 'Please choose an audio file first.';
        return;
      }

      output.textContent = 'Transcribing with ' + model + '...';

      try {
        const file = fileInput.files[0];

        // Only whisper-1 and the diarize model support timestamped formats.
        // Plain gpt-4o-transcribe / gpt-4o-mini-transcribe only accept json or text.
        let responseFormat = 'json';
        if (model === 'whisper-1') {
          responseFormat = 'verbose_json';
        } else if (model === 'gpt-4o-transcribe-diarize') {
          responseFormat = 'diarized_json';
        }

        const result = await puter.ai.speech2txt(file, {
          model: model,
          response_format: responseFormat
        });

        output.textContent = formatAsLyricLines(result);
      } catch (err) {
        output.textContent = 'Error: ' + err.message;
      }
    }

    // Converts seconds -> "m:ss"
    function toMinSec(totalSeconds) {
      const s = Math.max(0, Math.round(totalSeconds));
      const m = Math.floor(s / 60);
      const sec = String(s % 60).padStart(2, '0');
      return `${m}:${sec}`;
    }

    // Tries to build "line text [m:ss]" output from segments.
    // Falls back to raw text/JSON if segments aren't usable.
    function formatAsLyricLines(result) {
      try {
        if (result && Array.isArray(result.segments) && result.segments.length) {
          return result.segments
            .map(seg => {
              if (typeof seg.text !== 'string' || typeof seg.start !== 'number') {
                throw new Error('Segment missing text/start');
              }
              const line = seg.text.trim();
              if (!line) return null;
              return `${line} [${toMinSec(seg.start)}]`;
            })
            .filter(Boolean)
            .join('\n');
        }
        // No segments available (e.g. plain gpt-4o json/text) — nothing to time-align.
        throw new Error('No segments in response');
      } catch (e) {
        // Fallback: raw text if present, else raw JSON
        if (result && typeof result.text === 'string') return result.text;
        return JSON.stringify(result, null, 2);
      }
    }
  </script>

</body>
</html>
