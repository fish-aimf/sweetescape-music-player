name: Update Billboard Hot 100

on:
  schedule:
    - cron: '0 5 * * 1,2,3,4,5,6,0'
  workflow_dispatch: {}   

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run updater
        run: node scripts/update-billboard.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          YOUTUBE_API_KEYS: ${{ secrets.YOUTUBE_API_KEYS }}
